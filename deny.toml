[graph]
# Standard tier-1 targets
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
all-features = true

[advisories]
unmaintained = "workspace"
unsound = "all"
yanked = "deny"
ignore = []

[bans]
multiple-versions = "deny"
wildcards = "deny"
deny = [
    { crate = "openssl", use-instead = "rustls" },
    { crate = "openssl-sys", use-instead = "rustls" },
    "libssh2-sys",
]
skip = [
    { crate = "core-foundation@0.9.4", reason = "known ecosystem conflict with reqwest dependency tree" },
]
skip-tree = [
    { crate = "windows-sys", reason = "foundational crate with frequent updates" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"

[licenses]
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "ISC",
    "Unlicense",
    "Unicode-3.0",
]
# GPL-3.0 and AGPL-3.0 are automatically denied by not being in the allow list
exceptions = []
